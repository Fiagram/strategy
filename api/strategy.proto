syntax = "proto3";
package fiagram.strategy;

import "google/protobuf/timestamp.proto";

option go_package = "grpc/strategy";

service Strategy {
  rpc CreateAlert(CreateAlertRequest) returns (CreateAlertResponse) {}
  rpc GetAlerts(GetAlertsRequest) returns (GetAlertsResponse) {}
  rpc GetAlert(GetAlertRequest) returns (GetAlertResponse) {}
  rpc UpdateAlert(UpdateAlertRequest) returns (UpdateAlertResponse) {}
  rpc DeleteAlert(DeleteAlertRequest) returns (DeleteAlertResponse) {}
}

message Alert {
  enum Timeframe {
    TIMEFRAME_NONE = 0;
    TIMEFRAME_D1 = 1;
    TIMEFRAME_W1 = 2;
    TIMEFRAME_M1 = 3;
  }

  enum Indicator {
    INDICATOR_NONE = 0;
    INDICATOR_CLOSE = 1;
    INDICATOR_BOLLINGER_BANDS = 2;
    INDICATOR_RSI = 3;
    INDICATOR_MA10 = 4;
    INDICATOR_MA50 = 5;
    INDICATOR_MA100 = 6;
    INDICATOR_MA200 = 7;
  }

  enum Operator {
    OPERATOR_NONE = 0;
    OPERATOR_GREATER_THAN = 1;
    OPERATOR_LESS_THAN = 2;
    OPERATOR_CROSSING_UP = 3;
    OPERATOR_CROSSING_DOWN = 4;
    OPERATOR_CROSSING = 5;
  }

  enum Trigger {
    TRIGGER_NONE = 0;
    TRIGGER_ONCE = 1;
    TRIGGER_EVERY = 2;
  }

  uint64 id = 1;
  uint64 of_account_id = 2;
  Timeframe timeframe = 3;
  string symbol = 4;
  Indicator indicator = 5;
  Operator operator = 6;
  Trigger trigger = 7;
  int64 exp = 8;
  optional string message = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message CreateAlertRequest {
  uint64 of_account_id = 1;
  Alert.Timeframe timeframe = 2;
  string symbol = 3;
  Alert.Indicator indicator = 4;
  Alert.Operator operator = 5;
  Alert.Trigger trigger = 6;
  int64 exp = 7;
  optional string message = 8;
}

message CreateAlertResponse {
  Alert alert = 1;
}

message GetAlertsRequest {
  uint64 of_account_id = 1;
  uint32 limit = 2;
  uint32 offset = 3;
}

message GetAlertsResponse {
  repeated Alert alerts = 1;
}

message GetAlertRequest {
  uint64 of_account_id = 1;
  uint64 alert_id = 2;
}

message GetAlertResponse {
  Alert alert = 1;
}

message UpdateAlertRequest {
  uint64 of_account_id = 1;
  uint64 alert_id = 2;
  Alert.Timeframe timeframe = 3;
  string symbol = 4;
  Alert.Indicator indicator = 5;
  Alert.Operator operator = 6;
  Alert.Trigger trigger = 7;
  int64 exp = 8;
  optional string message = 9;
}

message UpdateAlertResponse {
  Alert alert = 1;
}

message DeleteAlertRequest {
  uint64 of_account_id = 1;
  uint64 alert_id = 2;
}

message DeleteAlertResponse {
  uint64 of_account_id = 1;
  uint64 alert_id = 2;
}